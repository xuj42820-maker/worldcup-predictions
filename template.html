<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界杯预测</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <aside class="sidebar">
      <h1><span class="emoji">⚽</span>预测文档</h1>
      <nav class="doc-list">
        {{DOC_LIST}}
      </nav>
    </aside>
    <main class="content">
      <div class="doc-content" id="doc-content">
        <p class="placeholder">← 点击左侧文档查看内容</p>
      </div>
    </main>
  </div>

  <script>
    const docs = {{DOCS_DATA}};

    function showDoc(id) {
      const contentEl = document.getElementById('doc-content');
      contentEl.innerHTML = docs[id];

      // 更新选中状态
      document.querySelectorAll('.doc-item').forEach(item => {
        item.classList.remove('active');
      });
      event.currentTarget.classList.add('active');

      // 移动端隐藏侧边栏
      if (window.innerWidth <= 768) {
        document.querySelector('.sidebar').classList.add('hidden');
        document.querySelector('.content').classList.add('full');
      }
    }

    // 移动端返回按钮
    document.addEventListener('DOMContentLoaded', () => {
      const content = document.querySelector('.content');
      const backBtn = document.createElement('button');
      backBtn.className = 'back-btn';
      backBtn.textContent = '← 返回目录';
      backBtn.onclick = () => {
        document.querySelector('.sidebar').classList.remove('hidden');
        content.classList.remove('full');
      };
      content.insertBefore(backBtn, content.firstChild);
    });
  </script>
</body>
</html>
